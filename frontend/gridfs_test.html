<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridFS Document Management</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        h1, h2 {
            margin-top: 0;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-light);
        }

        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed var(--border);
            border-radius: 0.5rem;
            cursor: pointer;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            flex-direction: column;
        }

        .file-name {
            font-weight: 600;
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .view-btn {
            background: var(--success);
        }

        .delete-btn {
            background: var(--error);
        }

        #status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
        }

        .success { background: #d1fae5; color: #065f46; display: block !important; }
        .error { background: #fee2e2; color: #991b1b; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📤 Upload Document</h1>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="file">Select Image (Max 5MB)</label>
                    <input type="file" id="file" name="file" accept="image/*" required>
                </div>
                <button type="submit">Upload to GridFS</button>
            </form>
            <div id="status"></div>
        </div>

        <div class="card">
            <h2>📋 Uploaded Files (Admin View)</h2>
            <ul id="fileList" class="file-list">
                <!-- Files will be loaded here -->
            </ul>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileList = document.getElementById('fileList');
        const status = document.getElementById('status');

        function showStatus(message, isError = false) {
            status.textContent = message;
            status.className = isError ? 'error' : 'success';
            setTimeout(() => status.style.display = 'none', 5000);
        }

        // Fetch and display files
        async function fetchFiles() {
            try {
                const response = await fetch('/api/files');
                const files = await response.json();
                
                fileList.innerHTML = files.map(file => `
                    <li class="file-item">
                        <div class="file-info">
                            <span class="file-name">${file.metadata?.originalName || file.filename}</span>
                            <span class="file-meta">Uploaded: ${new Date(file.uploadDate).toLocaleString()} | ${(file.length / 1024 / 1024).toFixed(2)} MB</span>
                        </div>
                        <div class="actions">
                            <button class="view-btn" onclick="viewFile('${file.filename}')">View</button>
                            <button class="delete-btn" onclick="deleteFile('${file._id}')">Delete</button>
                        </div>
                    </li>
                `).join('') || '<p>No files uploaded yet.</p>';
            } catch (err) {
                console.error('Error fetching files:', err);
            }
        }

        // Handle upload
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('file').files[0]);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    showStatus('File uploaded successfully to GridFS!');
                    uploadForm.reset();
                    fetchFiles();
                } else {
                    showStatus(result.message || 'Upload failed', true);
                }
            } catch (err) {
                showStatus('Error uploading file', true);
            }
        });

        // View file
        function viewFile(filename) {
            window.open(`/api/files/${filename}`, '_blank');
        }

        // Delete file
        async function deleteFile(id) {
            if (!confirm('Are you sure you want to delete this file?')) return;
            
            try {
                const response = await fetch(`/api/files/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showStatus('File deleted successfully');
                    fetchFiles();
                } else {
                    showStatus('Delete failed', true);
                }
            } catch (err) {
                showStatus('Error deleting file', true);
            }
        }

        // Initial load
        fetchFiles();
    </script>
</body>
</html>
